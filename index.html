<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Princess — Writings</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Josefin+Sans:wght@100;200;300;400&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d0b09;
      --surface: #131109;
      --amber: #c9903a;
      --amber-soft: #e8b86d;
      --amber-dim: rgba(201,144,58,0.14);
      --amber-border: rgba(201,144,58,0.22);
      --cream: #f0e8d8;
      --muted: #7a7060;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'EB Garamond', Georgia, serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      position: relative;
      padding: 80px 24px 120px;
      overflow: hidden;
    }

    .hero-glow {
      position: absolute;
      width: 800px; height: 800px; border-radius: 50%;
      background: radial-gradient(circle, rgba(201,144,58,0.07) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none;
      animation: breathe 8s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { opacity:.5; transform:translate(-50%,-50%) scale(1); }
      50%      { opacity:1;  transform:translate(-50%,-50%) scale(1.15); }
    }

    #hero-particles { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
    .hparticle {
      position:absolute; bottom:-10px; border-radius:50%;
      background:var(--amber); animation:pfloat linear infinite;
    }
    @keyframes pfloat {
      0%   { transform:translateY(0); opacity:0; }
      10%  { opacity:.5; }
      90%  { opacity:.15; }
      100% { transform:translateY(-110vh); opacity:0; }
    }

    .hero-eyebrow {
      font-family:'Josefin Sans',sans-serif;
      font-size:9px; font-weight:300; letter-spacing:.42em;
      text-transform:uppercase; color:var(--amber);
      margin-bottom:32px; opacity:0;
      animation:fadeUp 1s .3s forwards;
    }
    .hero-name {
      font-family:'Cormorant Infant',serif;
      font-size:clamp(72px,14vw,150px);
      font-weight:300; line-height:1;
      color:var(--cream); opacity:0;
      animation:fadeUp 1.2s .5s forwards;
    }
    .hero-name em { font-style:italic; color:var(--amber-soft); }
    .hero-rule {
      width:1px; height:80px;
      background:linear-gradient(to bottom, var(--amber), transparent);
      margin:44px auto 36px; opacity:0;
      animation:fadeUp 1s .9s forwards;
    }
    .hero-desc {
      font-family:'EB Garamond',serif;
      font-size:clamp(16px,2vw,21px); font-style:italic;
      color:rgba(240,232,216,.5); max-width:480px; line-height:1.75;
      opacity:0; animation:fadeUp 1s 1.1s forwards;
    }
    .hero-count {
      font-family:'Josefin Sans',sans-serif;
      font-size:9px; font-weight:200; letter-spacing:.35em;
      text-transform:uppercase; color:var(--muted);
      margin-top:40px; opacity:0;
      animation:fadeUp 1s 1.4s forwards;
    }
    .hero-count span { color:var(--amber); }

    .scroll-cue {
      position:absolute; bottom:44px; left:50%;
      transform:translateX(-50%);
      display:flex; flex-direction:column; align-items:center; gap:10px;
      opacity:0; animation:fadeUp 1s 1.8s forwards;
    }
    .scroll-cue-label {
      font-family:'Josefin Sans',sans-serif;
      font-size:8px; letter-spacing:.35em; text-transform:uppercase; color:var(--muted);
    }
    .scroll-cue-line {
      width:1px; height:48px;
      background:linear-gradient(to bottom, var(--amber), transparent);
      animation:scPulse 2s ease-in-out infinite;
    }
    @keyframes scPulse { 0%,100%{opacity:.4;} 50%{opacity:1;} }

    /* ── SECTION ── */
    .writings-section { padding:60px 0 120px; }
    .section-header { text-align:center; padding:0 24px 56px; }
    .section-label {
      font-family:'Josefin Sans',sans-serif;
      font-size:9px; font-weight:300; letter-spacing:.42em;
      text-transform:uppercase; color:var(--amber); margin-bottom:14px;
    }
    .section-title {
      font-family:'Cormorant Infant',serif;
      font-size:clamp(28px,4vw,46px); font-weight:300; color:var(--cream);
    }

    /* ── GRID ── */
    .grid {
      max-width:1200px; margin:0 auto; padding:0 32px;
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(280px,1fr));
      gap:1px;
      background:rgba(240,232,216,0.04);
      border:1px solid rgba(240,232,216,0.04);
    }

    /* ── CARD ── */
    .card {
      position:relative;
      background:var(--bg);
      padding:36px 32px 32px;
      text-decoration:none; color:inherit;
      display:flex; flex-direction:column; gap:12px;
      min-height:180px; overflow:hidden;
      opacity:0; transform:translateY(20px);
      transition: opacity .6s ease, transform .6s ease, background .35s ease;
    }
    .card.revealed { opacity:1; transform:translateY(0); }

    .card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg, transparent, var(--amber), transparent);
      opacity:0; transition:opacity .4s;
    }
    .card:hover { background:#161309; }
    .card:hover::before { opacity:1; }

    .card-num {
      font-family:'Josefin Sans',sans-serif;
      font-size:9px; font-weight:100; letter-spacing:.35em;
      color:var(--muted); text-transform:uppercase;
    }
    .card-title {
      font-family:'Cormorant Infant',serif;
      font-size:clamp(18px,2vw,24px); font-weight:300;
      line-height:1.28; color:var(--cream); flex:1;
      transition:color .3s;
    }
    .card:hover .card-title { color:var(--amber-soft); }

    .card-arrow {
      display:flex; align-items:center; gap:10px;
      font-family:'Josefin Sans',sans-serif;
      font-size:8px; font-weight:300; letter-spacing:.28em;
      text-transform:uppercase; color:var(--amber);
      opacity:0; transform:translateY(6px);
      transition:opacity .3s, transform .3s, gap .3s;
    }
    .card:hover .card-arrow { opacity:1; transform:translateY(0); }
    .card-arrow-line {
      width:24px; height:1px; background:var(--amber);
      transition:width .3s;
    }
    .card:hover .card-arrow-line { width:40px; }

    /* ── PREVIEW WINDOW ── */
    #preview-window {
      position:fixed;
      width:380px; height:264px;
      pointer-events:none;
      z-index:8000;
      opacity:0;
      transform:scale(.92) translateY(8px);
      transition:opacity .25s ease, transform .25s ease;
      border-radius:5px;
      overflow:hidden;
      box-shadow:
        0 0 0 1px rgba(201,144,58,.35),
        0 24px 64px rgba(0,0,0,.75),
        0 0 80px rgba(201,144,58,.07);
    }
    #preview-window.visible { opacity:1; transform:scale(1) translateY(0); }

    .preview-chrome {
      background:#1c1810;
      border-bottom:1px solid rgba(201,144,58,.2);
      padding:8px 12px;
      display:flex; align-items:center; gap:8px;
      height:36px;
    }
    .chrome-dots { display:flex; gap:5px; }
    .chrome-dot { width:8px; height:8px; border-radius:50%; background:rgba(201,144,58,.22); }
    .chrome-dot:first-child { background:rgba(201,144,58,.55); }
    .chrome-bar {
      flex:1; background:rgba(201,144,58,.06);
      border:1px solid rgba(201,144,58,.14);
      border-radius:20px; height:20px;
      display:flex; align-items:center; padding:0 10px;
    }
    .chrome-url {
      font-family:'Josefin Sans',sans-serif;
      font-size:8px; font-weight:200; letter-spacing:.12em;
      color:var(--muted); overflow:hidden; white-space:nowrap;
      text-overflow:ellipsis; max-width:220px;
    }

    .preview-iframe-wrap {
      width:100%; height:228px;
      position:relative; background:#0d0b09; overflow:hidden;
    }
    .preview-iframe-wrap iframe {
      width:960px; height:640px; border:none;
      transform:scale(0.396); transform-origin:top left;
      pointer-events:none;
    }
    .preview-overlay {
      position:absolute; inset:0;
      background:linear-gradient(to bottom, transparent 55%, rgba(13,11,9,.9));
      pointer-events:none;
    }

    /* ── FOOTER ── */
    footer {
      text-align:center; padding:60px 24px 80px;
      border-top:1px solid rgba(240,232,216,.05);
    }
    .footer-eyebrow {
      font-family:'Josefin Sans',sans-serif;
      font-size:9px; font-weight:200; letter-spacing:.38em;
      text-transform:uppercase; color:var(--muted); margin-bottom:10px;
    }
    .footer-name {
      font-family:'Cormorant Infant',serif;
      font-size:36px; font-weight:300; font-style:italic;
      color:var(--amber-soft); margin-bottom:20px;
    }
    .footer-medium {
      font-family:'Josefin Sans',sans-serif;
      font-size:9px; font-weight:300; letter-spacing:.22em;
      text-transform:uppercase; color:var(--muted);
      text-decoration:none; transition:color .3s;
    }
    .footer-medium:hover { color:var(--amber); }
    .footer-medium span { color:var(--amber); }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    @media (max-width:640px) {
      .grid { padding:0 16px; grid-template-columns:1fr; }
      #preview-window { display:none; }
    }
  </style>
</head>
<body>

<section class="hero">
  <div class="hero-glow"></div>
  <div id="hero-particles"></div>
  <p class="hero-eyebrow">A collection of essays &amp; letters</p>
  <h1 class="hero-name"><em>Princess</em></h1>
  <div class="hero-rule"></div>
  <p class="hero-desc">Words written for the parts of you that still need to hear them.</p>
  <p class="hero-count"><span id="writing-count"></span> writings</p>
  <div class="scroll-cue">
    <span class="scroll-cue-label">Read</span>
    <div class="scroll-cue-line"></div>
  </div>
</section>

<section class="writings-section">
  <div class="section-header">
    <p class="section-label">All writings</p>
    <h2 class="section-title">Every letter, every essay</h2>
  </div>
  <div class="grid" id="grid"></div>
</section>

<footer>
  <p class="footer-eyebrow">Written by</p>
  <p class="footer-name">Princess</p>
  <a href="https://medium.com/@prvaxis" target="_blank" class="footer-medium">
    Originally published on <span>Medium</span>
  </a>
</footer>

<div id="preview-window">
  <div class="preview-chrome">
    <div class="chrome-dots">
      <div class="chrome-dot"></div>
      <div class="chrome-dot"></div>
      <div class="chrome-dot"></div>
    </div>
    <div class="chrome-bar">
      <span class="chrome-url" id="preview-url">princess · writings</span>
    </div>
  </div>
  <div class="preview-iframe-wrap">
    <iframe id="preview-iframe" src="" sandbox="allow-same-origin allow-scripts"></iframe>
    <div class="preview-overlay"></div>
  </div>
</div>

<script>
  // ── Filenames with SPACES to match GitHub repo exactly ──
  const writings = [
    { title:"To the Child You Used to Be",                          file:"To The Child You Used To Be.html" },
    { title:"The Day You Stopped Performing",                       file:"The Day You.html" },
    { title:"The Apology",                                          file:"The Apology.html" },
    { title:"The Things Your Father Never Told You",                file:"The Things Your Father.html" },
    { title:"For the Girl",                                         file:"For The Girl.html" },
    { title:"You Are More Than",                                    file:"You Are More Than.html" },
    { title:"The Things Your Best Friend Never Told You",           file:"The Things your Best Friend.html" },
    { title:"The Things Your Sister Never Told You",                file:"The Things Your Sister.html" },
    { title:"The Weight of Relationships",                          file:"The Weight Of Relationships.html" },
    { title:"When Someone Fades Out of Your Life",                  file:"When Someone Fades Out Of Your Life.html" },
    { title:"The Exhaustion of Curating a Life You Don't Actually Enjoy", file:"The Exahaustion Of Curating A Life You Don t Actually Enjoy.html" },
    { title:"The Day You Realized",                                 file:"The Day You Realized.html" },
    { title:"Being a Stranger in Your Own Family",                  file:"Being A Stranger.html" },
    { title:"The Identity Crisis of the High Achiever",             file:"The Identity Crisis of The High Achiever.html" },
    { title:"The Anatomy of a Breakup With Oneself",                file:"The Anatomy of a Breakup With Oneself.html" },
    { title:"Midnight Conversations With the Soul",                 file:"Midnight Converstaions With The Soul.html" },
    { title:"Hating the Person You've Had to Become to Survive",    file:"Hating The Person.html" },
    { title:"I Know You're Tired",                                  file:"I Know You re Tired.html" },
    { title:"Look How Far You've Come",                             file:"Look How Far You ve Came.html" },
    { title:"It's Time to Forgive Yourself",                        file:"It s Time To Forgive Yourself.html" },
    { title:"The Parts of Me I Lost Loving You",                    file:"The Parts Of Me.html" },
    { title:"Dear Heart, It's Time to Rest",                        file:"Dear Heart.html" },
    { title:"To the One Reading This in the Dark",                  file:"To The One Reading This In The Dark.html" },
    { title:"Waiting for the Other Shoe to Drop",                   file:"Waiting For The Other Shoe To Drop.html" },
    { title:"The Fear That Everyone Will Eventually Leave",         file:"The Fear That Everyone.html" },
    { title:"That Empty Feeling After a Productive Day",            file:"The Empty Feeling After a Productive Day.html" },
    { title:"The Late Night Ceiling Stare",                         file:"The Late Night Ceiling Stare.html" },
    { title:"Why You Push People Away",                             file:"Why You Push People Away.html" },
    { title:"Scrolling to Avoid Your Own Thoughts",                 file:"Scrolling To Avoid.html" },
    { title:"The Weight Wasn't the Problem",                        file:"The Weight Wasn t The Problem.html" },
    { title:"Leaving Didn't Hurt Me",                               file:"Leaving Didn t Hurt Me.html" },
    { title:"I Didn't Lose Them",                                   file:"I Didn t Lose Them.html" },
    { title:"The Things I Wanted to Say",                           file:"The Things I Wanted To say.html" },
    { title:"Loving Them Wasn't the Problem",                       file:"Loving Them Wasn t The Problem.html" },
    { title:"The Boundaries I Should Have Set Sooner",              file:"The Boundaries.html" },
    { title:"The Moments I Pretended Not to Care",                  file:"The Moments.html" },
    { title:"My Heart Was Honest",                                  file:"My Heart Was Honest.html" },
    { title:"The Hardest Part Was Choosing Myself",                 file:"The Hardest Part Was Choosing Myself.html" },
    { title:"The Strength It Took to Walk Away",                    file:"The Strength It Took.html" },
    { title:"The Love I Had to Teach Myself",                       file:"The Love I Had To.html" },
    { title:"The Strength I Found in Falling Apart",                file:"The Strength I Found.html" },
    { title:"The Love That Wasn't Meant for Me",                    file:"The Love.html" },
    { title:"The Quiet Bravery of Choosing to Stay",                file:"The Quiet Bravery Of Choosing To Stay.html" },
    { title:"I Was Grieving a Family That Never Existed",           file:"I Was Grieving  Family That Never Existed.html" },
    { title:"They Stayed at the Surface",                           file:"They Stayed At The Surface.html" },
    { title:"The Hurt That Finally Made Me Choose Myself",          file:"The Hurt That Finally Made Me.html" },
    { title:"The People Who Only Loved Me When It Was Convenient",  file:"The People Who Only Loved Me.html" },
    { title:"The Things I Settled For",                             file:"The Things I Settled For.html" },
    { title:"The Kindness I Never Received Back",                   file:"The Kindness.html" },
    { title:"When They've Moved On",                                file:"When They ve Moved On.html" },
    { title:"When You're Grieving a Future You Never Got to Live",  file:"When You re Grieving A Future.html" },
    { title:"When You're Tired of Feeling Like Someone's Almost",   file:"When You re Tired Of Feeling Like Someone s Almost.html" },
    { title:"The Emotions I Was Never Allowed to Feel",             file:"The Emotions I Was Never Allowed.html" },
    { title:"The Forgiveness I Gave",                               file:"The Forgiveness I Gave.html" },
    { title:"The Day I Realized I Deserved More",                   file:"The Day I Realized.html" },
    { title:"The Love I Thought Would Save Me",                     file:"The Love I Thought.html" },
    { title:"The Apologies I Never Received",                       file:"The Apologies I Never Received.html" },
    { title:"The Strength I Didn't Know I Had",                     file:"The strength I Didn t Know I had.html" },
    { title:"The Way I Loved — Before I Learned Better",            file:"The Way I Loved.html" },
    { title:"What They Missed In Me",                               file:"What They Missed In Me.html" },
    { title:"Some Endings Are Just You",                            file:"Some Endings Are Just You.html" },
    { title:"Pain Showed Me Parts of Myself",                       file:"Pain Showed Me Parts Of Myself.html" },
    { title:"Finding Peace in Goodbyes",                            file:"Finding Peace In Goodbyes.html" },
    { title:"When You're Trying to Forgive Someone",                file:"When You Are Trying To Forgive Someone.html" },
    { title:"The Slow, Quiet Process of Letting Go",                file:"The Slow Quiet Process Of Letting Go Of Someone.html" },
    { title:"Nothing Ended. I Just Woke Up.",                       file:"Nothing Ended.html" },
  ];

  document.getElementById('writing-count').textContent = writings.length;

  // Build grid
  const grid = document.getElementById('grid');
  writings.forEach((w, i) => {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = w.file;
    a.dataset.file = w.file;
    a.innerHTML = `
      <span class="card-num">${String(i+1).padStart(2,'0')}</span>
      <span class="card-title">${w.title}</span>
      <span class="card-arrow"><span class="card-arrow-line"></span>Read</span>
    `;
    grid.appendChild(a);
  });

  // Hero particles
  const hp = document.getElementById('hero-particles');
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'hparticle';
    const s = 1 + Math.random() * 2;
    p.style.cssText = `left:${Math.random()*100}%;width:${s}px;height:${s}px;animation-duration:${14+Math.random()*18}s;animation-delay:-${Math.random()*20}s;opacity:${.1+Math.random()*.3};`;
    hp.appendChild(p);
  }

  // Scroll reveal
  const cards = document.querySelectorAll('.card');
  const revObs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('revealed'); revObs.unobserve(e.target); }
    });
  }, { threshold: 0.05 });
  cards.forEach(c => revObs.observe(c));

  // Preview window
  const pw   = document.getElementById('preview-window');
  const pif  = document.getElementById('preview-iframe');
  const purl = document.getElementById('preview-url');
  let currentFile = null, mx = 0, my = 0, hideTimer = null;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    if (pw.classList.contains('visible')) positionPreview();
  });

  function positionPreview() {
    const W=380, H=264, vw=window.innerWidth, vh=window.innerHeight, m=16;
    let x = mx+26, y = my-H/2;
    if (x+W+m > vw) x = mx-W-26;
    if (y < m) y = m;
    if (y+H+m > vh) y = vh-H-m;
    pw.style.left = x+'px';
    pw.style.top  = y+'px';
  }

  function showPreview(file, title) {
    clearTimeout(hideTimer);
    positionPreview();
    if (file !== currentFile) {
      currentFile = file;
      pif.src = file;
      purl.textContent = title;
    }
    pw.classList.add('visible');
  }

  function hidePreview() {
    hideTimer = setTimeout(() => pw.classList.remove('visible'), 100);
  }

  cards.forEach(card => {
    const title = card.querySelector('.card-title').textContent;
    card.addEventListener('mouseenter', () => showPreview(card.dataset.file, title));
    card.addEventListener('mouseleave', hidePreview);
  });
</script>
</body>
</html>
